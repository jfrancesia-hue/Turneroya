# Desarrollo local de TurneroYa con Docker.
# Uso: docker compose up -d → http://localhost:8080

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:10000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: turneroya
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      PORT: 10000
    volumes:
      - ./src:/var/www/html/src
      - ./public:/var/www/html/public
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./scripts:/var/www/html/scripts
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: turneroya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - turneroya_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d turneroya"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  turneroya_db:
