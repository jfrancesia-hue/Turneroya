# Reservia - Render Blueprint
# Deploy vía: https://dashboard.render.com → New → Blueprint → conectar repo
#
# Crea:
#   - Web Service: reservia-app (Docker, $7/mo Starter)
#   - Database:   reservia-db  (Postgres 16, $7/mo Starter)
#   - Cron Job:   reservia-reminders (cada hora)

services:
  - type: web
    name: reservia-app
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: America/Argentina/Buenos_Aires
      - key: APP_URL
        sync: false   # se setea manual con el dominio definitivo
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: reservia-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: reservia-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: reservia-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: reservia-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: reservia-db
          property: password
      # Estas deben cargarse manualmente en el Dashboard de Render:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_VALIDATE_SIGNATURE
        value: "true"
      - key: TWILIO_REMINDER_CONTENT_SID
        sync: false
      - key: TWILIO_CONFIRMATION_CONTENT_SID
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: MAIL_DRIVER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: noreply@reservia.app
      - key: MAIL_FROM_NAME
        value: Reservia

  - type: cron
    name: reservia-reminders
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    schedule: "0 * * * *"   # cada hora en punto
    dockerCommand: php /var/www/html/scripts/reminders_cron.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: America/Argentina/Buenos_Aires
      - key: DB_HOST
        fromDatabase:
          name: reservia-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: reservia-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: reservia-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: reservia-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: reservia-db
          property: password
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_REMINDER_CONTENT_SID
        sync: false
      - key: TWILIO_CONFIRMATION_CONTENT_SID
        sync: false

  - type: cron
    name: reservia-expire-payments
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    schedule: "*/5 * * * *"
    dockerCommand: php /var/www/html/scripts/expire_pending_payments.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: America/Argentina/Buenos_Aires
      - key: DB_HOST
        fromDatabase:
          name: reservia-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: reservia-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: reservia-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: reservia-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: reservia-db
          property: password

databases:
  - name: reservia-db
    databaseName: reservia
    user: reservia
    plan: starter
    region: oregon
    postgresMajorVersion: "16"
